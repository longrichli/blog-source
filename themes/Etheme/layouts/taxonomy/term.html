{{ partial "header.html" . }}

<section id="content">
  <ul class="terms_listing">
    {{ range .Pages }}
      <li>
        <span>
          {{ if not .Date.IsZero }}
            {{ .Date.Format "2006-01-02" }}
          {{ end }}
        </span>
        <a href="{{ .Permalink }}">
          {{ .Title }}
        </a>
      </li>
    {{ end }}
  </ul>
</section>

{{ partial "footer.html" . }}
