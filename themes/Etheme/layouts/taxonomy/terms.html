{{ partial "header.html" . }}

<section id="content">
  <ul class="tags">
    {{ range .Data.Terms.ByCount }}
    <li style="margin-bottom: 8px; font-size: 17px; ">
      <a href="{{ .Page.Permalink }}" style="text-decoration:none;">
        {{ .Page.Title }}
      </a>
        <span style="color:#888; margin-left: 5px;">
            ({{ .Count }})
        </span>
    </li>
    {{ end }}
  </ul>
</section>

{{ partial "footer.html" . }}
