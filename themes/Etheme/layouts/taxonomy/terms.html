{{ partial "header.html" . }}

<section id="content">
  <ul class="terms">
    {{ range .Data.Terms.ByCount }}
    <li>
      <a href="{{ .Page.Permalink }}">
        {{ .Page.Title }}
      </a>
      <span>
        ({{ .Count }})
      </span>
    </li>
    {{ end }}
  </ul>
</section>

{{ partial "footer.html" . }}
