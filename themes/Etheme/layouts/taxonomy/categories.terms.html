{{ partial "header.html" . }}

<section id="content">
  <ul class ="tags">
    {{ range .Data.Terms.ByCount }}
    <li>
      <a href="{{ .Page.Permalink }}">
        {{ .Page.Title }}
      </a>
        <span style="color:#888; margin-left: 5px;">
            ({{ .Count }})
        </span>
    </li>
    {{ end }}
  </ul>
</section>

{{ partial "footer.html" . }}
